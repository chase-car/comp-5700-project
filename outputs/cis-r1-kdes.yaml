element1:
  name: Ensure that local logging has been enabled on all systems and networking
  requirements:
    req1: System and networking devices must be enabled to log.
    req10: Data should be encrypted.
    req11: Data must be stored securely.
    req12: Network devices must be secured.
    req13: Network traffic must be monitored.
    req14: Network segments must be isolated.
    req15: Regularly scan for vulnerabilities.
    req16: Vulnerabilities must be addressed promptly.
    req2: All systems and networking devices are enabled.
    req3: Users must be authenticated.
    req4: Credentials must be secure.
    req5: Authentication mechanisms must be reliable.
    req6: Users must have appropriate authorization.
    req7: Access rights are limited.
    req8: Authorization checks must be performed.
    req9: Sensitive data must be protected.
element2:
  name: Ensure that if the kubelet refers to a configuration file with the --config
    argument, that
  requirements:
    req1: Permissions must be 644 or more restrictive.
    req2: Validate the file permissions against 644 or more restrictive.
    req3: 644 or more restrictive permissions.
    req4: Validate the file permissions.
element3:
  name: Ensure that only network ports, protocols, and services listening on a system
  requirements:
    req1: Validated business needs are specified for each system.
    req2: Only network ports, protocols, and services listening on a system are running.
